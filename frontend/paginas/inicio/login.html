<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- El título de la pestaña del navegador -->
    <title>Login | ELARIS</title>
    <!-- Ícono de la pestaña (favicon) -->
    <link rel="icon" type="image/png" href="../../imagenes/logo-dorado.png">
    <!-- Enlace a tu archivo CSS externo para los estilos visuales -->
    <link rel="stylesheet" href="../../css/Inicio/auth.css">
</head>

<body>

    <!-- navbar de inicio -->

    <header class="navbar-auth">
        <a href="../index.html" class="navbar-auth__logo">
            <img src="../../imagenes/logo-dorado.png" alt="ELARIS" height="80">
        </a>

        <nav class="navbar-auth__nav">
            <a href="../index.html">Inicio</a>
            <a href="#">Destinos</a>
            <a href="#">Ayuda</a>
        </nav>

        <div class="navbar-auth__actions">
            <!-- Como estamos en Login, Iniciar sesión es Sólido (activo) -->
            <a href="login.html" class="btn-nav btn-nav--solid">Iniciar sesión</a>
            <!-- Y Registrarse pasa a Fantasma (inactivo) -->
            <a href="register.html" class="btn-nav btn-nav--ghost">Registrarse</a>
        </div>
    </header>





    <!-- La etiqueta <main> indica el contenido principal de esta página, el contenedor general -->
    <main class="auth">
        <!-- <section> divide la página. Esta sección es para la imagen de fondo y el mensaje motivacional ("hero") -->
        <section class="auth__hero">
            <div class="brand">
                <a href="../index.html"></a>
            </div>

            <div class="hero-content">
                <h1>Tu próximo horizonte te espera</h1>
                <p>Experiencias de vuelo diseñadas con precisión para el viajero moderno.</p>
            </div>
        </section>

        <!-- Esta sección contiene específicamente el recuadro blanco donde va el formulario -->
        <section class="auth__form-section">
            <div class="auth-box">
                <div class="auth-header">
                    <h2>Bienvenido de nuevo</h2>
                    <p>Ingresa tus credenciales para acceder a tu cuenta.</p>
                </div>

                <!-- <form> envuelve los campos que el usuario va a llenar -->
                <form class="auth-form" action="../cliente/dashboard.html" method="get">

                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="nombre@ejemplo.com" required>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label for="password">Contraseña</label>
                            <a href="#" class="forgot-link">Olvidé mi contraseña</a>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Iniciar Sesión</button>
                    </div>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes una cuenta? <a href="register.html">Regístrate</a></p>
                </div>
            </div>
        </section>
    </main>



</body>

</html>
