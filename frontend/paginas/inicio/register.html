<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título que aparece en la pestaña arriba en el navegador -->
    <title>Registro | ELARIS</title>
    <!-- CSS para darle los mismos estilos que al login -->
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <!-- main sirve como contenedor general que abarca las dos mitades de la pantalla -->
    <main class="auth">

        <!-- Mitad de la pantalla visual (foto y mensaje inspiracional) -->
        <section class="auth__hero">
            <div class="brand">
                <!-- Este enlace te lleva a la página principal de inicio al dar clic al logo/nombre -->
                <a href="../index.html">ELARIS</a>
            </div>

            <div class="hero-content">
                <h1>Eleva tu experiencia.</h1>
                <p>Crea tu cuenta para comenzar tu viaje con nosotros.</p>
            </div>
        </section>

        <!-- Mitad de la pantalla con el formulario donde el usuario escribe sus datos -->
        <section class="auth__form-section">
            <div class="auth-box">
                <h2>Crea tu cuenta</h2>
                <p>Completa tus datos para registrarte.</p>

                <form action="#" method="post">
                    <label for="nombre">Nombre completo</label>
                    <!-- type="text" es para escribir texto normal (letras y números) -->
                    <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required>

                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="nombre@ejemplo.com" required>

                    <label for="password">Contraseña</label>
                    <!-- type="password" oculta el texto con puntos por seguridad -->
                    <input type="password" id="password" name="password" placeholder="••••••••" required>

                    <!-- Se le pide contraseña dos veces para confirmar que no se equivocó al teclear -->
                    <label for="confirmar">Confirmar contraseña</label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required>

                    <!-- Al poner el <input> dentro del <label>, si das clic a las letras, también se marca la palomita -->
                    <label>
                        <!-- type="checkbox" crea el clásico cuadrito para palomear -->
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <label for="terminos">Acepto los términos y condiciones</label>

                    </label>

                    <button type="submit">Crear cuenta</button>
                </form>

                <!-- Si ya se había registrado, aquí tiene un puente directo hacia login.html -->
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </section>
    </main>

    <!-- Pie de la página -->
    <footer class="auth-footer">
        <p>© 2026 ELARIS. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
