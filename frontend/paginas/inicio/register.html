<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | ELARIS</title>

    <!-- Ícono de la pestaña (favicon) -->

    <link rel="icon" type="image/png" href="../../imagenes/logo-dorado.png">
    <link rel="stylesheet" href="../../css/Inicio/auth.css">
</head>

<body>

    <header class="navbar-auth">
        <a href="index.html" class="navbar-auth__logo">
            <img src="../../imagenes/logo-dorado.png" alt="ELARIS" height="80">
        </a>

        <nav class="navbar-auth__nav">
            <a href="index.html">Inicio</a>
            <a href="../cliente/buscar-vuelos.html">Destinos</a>
            <a href="#">Ayuda</a>
        </nav>

        <div class="navbar-auth__actions">
            <a href="login.html" class="btn-nav btn-nav--ghost">Iniciar sesión</a>
            <a href="register.html" class="btn-nav btn-nav--solid">Registrarse</a>
        </div>
    </header>

    <main class="auth">

        <!-- Columna izquierda: imagen de fondo con texto -->

        <section class="auth__hero auth__hero--register">
            <div class="brand">
                <a href="index.html"></a>
            </div>

            <div class="hero-content">
                <h1>Eleva tu perspectiva.</h1>
                <p>Únete y descubre destinos diseñados para el viajero moderno.</p>
            </div>
        </section>

        <!-- Columna derecha: formulario de registro -->

        <section class="auth__form-section auth__form-section--register">
            <div class="auth-box">

                <div class="auth-header">
                    <h2>Crea tu cuenta</h2>
                    <p>Comienza tu viaje con nosotros hoy mismo.</p>
                </div>

                <form class="auth-form" action="#" method="post">

                    <!-- Tipo + Número de identificación en fila -->
                    <div class="form-row">

                        <!-- Desplegable: tipo de documento -->
                        <div class="form-group form-group--tipo-id">
                            <label for="tipo-identificacion">Tipo de identificación</label>
                            <select id="tipo-identificacion" name="tipo_identificacion" required>
                                <option value="" disabled selected>Selecciona...</option>
                                <option value="CC">Cédula de ciudadanía</option>
                                <option value="CE">Cédula de extranjería</option>
                                <option value="PA">Pasaporte</option>
                                <option value="TI">Tarjeta de identidad</option>
                                <option value="NIT">NIT</option>
                            </select>
                        </div>

                        <!-- Número de identificación -->
                        <div class="form-group form-group--num-id">
                            <label for="numero-identificacion">Número de identificación</label>
                            <input type="text" id="numero-identificacion" name="numero_identificacion"
                                placeholder="Ej: 1234567890" required>
                        </div>

                    </div>

                    <!-- Nombre completo -->

                    <div class="form-group">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required>
                    </div>

                    <!-- Correo -->

                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="nombre@ejemplo.com" required>
                    </div>

                    <!-- Teléfono y Dirección en fila -->
                    <div class="form-row">

                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" name="telefono"
                                placeholder="Ej: +57 300 123 4567" required>
                        </div>

                        <div class="form-group">
                            <label for="direccion">Dirección</label>
                            <input type="text" id="direccion" name="direccion"
                                placeholder="Ej: Calle 10 # 5-20" required>
                        </div>

                    </div>

                    <!-- Contraseña y confirmar en fila -->

                    <div class="form-row">
                        <div class="form-group">

                            <label for="password">Contraseña</label>

                            <!-- type="password" oculta lo que escribes con puntos -->

                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmar">Confirmar Contraseña</label>
                            <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Checkbox de términos -->

                    <div class="form-check">

                        <!-- type="checkbox" crea la casillatilde para aceptar -->
                        <input type="checkbox" id="terminos" name="terminos" required>
                        <label for="terminos">Acepto los <a href="#" class="terms-link">términos y
                                condiciones</a>.</label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Crear cuenta →</button>
                    </div>

                </form>

                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
                </div>

            </div>
        </section>

    </main>

</body>

</html>
