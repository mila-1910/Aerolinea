<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | ELARIS</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

    <main class="auth">
        <section class="auth__hero">
            <div class="brand">
                <a href="../index.html">ELARIS</a>
            </div>

            <div class="hero-content">
                <h1>Eleva tu experiencia.</h1>
                <p>Crea tu cuenta para comenzar tu viaje con nosotros.</p>
            </div>
        </section>

        <section class="auth__form-section">
            <div class="auth-box">
                <h2>Crea tu cuenta</h2>
                <p>Completa tus datos para registrarte.</p>

                <form action="#" method="post">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required>

                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="nombre@ejemplo.com" required>

                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>

                    <label for="confirmar">Confirmar contraseña</label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required>

                    <label>
                        <input type="checkbox" required>
                        Acepto los términos y condiciones
                    </label>

                    <button type="submit">Crear cuenta</button>
                </form>

                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </section>
    </main>

    <footer class="auth-footer">
        <p>© 2026 ELARIS. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
