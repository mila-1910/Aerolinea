<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Reserva | ELARIS</title>
    <link rel="stylesheet" href="../../css/cliente.css">
    <link rel="stylesheet" href="../../css/resumen-reserva.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a class="navbar-logo" href="dashboard.html">
            <img src="../../imagenes/logo-dorado.png" alt="ELARIS" height="80">
        </a>
        <ul class="navbar-links">
            <li><a href="dashboard.html">Inicio</a></li>
            <li><a href="buscar-vuelos.html">Destinos</a></li>
            <li><a href="#">Información</a></li>
            <li><a href="#">Ayuda</a></li>
        </ul>
        <div class="navbar-perfil">
            <div class="perfil-trigger">
                <div class="avatar">M</div>
                <span>Messi</span>
            </div>
            <ul class="dropdown">
                <li><a href="#">Mi cuenta</a></li>
                <li><a href="mis-reservas.html">Mis reservas</a></li>
                <li><hr></li>
                <li><a href="../../paginas/inicio/login.html" class="cerrar-sesion">Cerrar sesión</a></li>
            </ul>
        </div>
    </nav>

    <!-- Parte principal -->
    <div class="resumen-contenedor">

        <!-- Título -->
        <div class="resumen-titulo">
            <h1>✈ Resumen de tu reserva</h1>
        </div>

        <!-- Vuelo seleccionado -->
        <div class="resumen-bloque">
            <div class="bloque-header">
                <h3>Vuelo seleccionado</h3>
            </div>

            
            <div class="bloque-contenido">
                <div class="vuelo-ruta">
                    <span class="vuelo-ciudad">Bogotá</span>
                    <span class="vuelo-flecha">→</span>
                    <span class="vuelo-ciudad">Madrid</span>
                </div>
                <div class="vuelo-detalles">
                    <div class="vuelo-detalle-item">
                        <span class="detalle-label">Hora</span>
                        <span class="detalle-valor">10:30</span>
                    </div>
                    <div class="vuelo-detalle-item">
                        <span class="detalle-label">Llegada</span>
                        <span class="detalle-valor">8:45 am (+1 día)</span>
                    </div>
                    <div class="vuelo-detalle-item">
                        <span class="detalle-label">Duración</span>
                        <span class="detalle-valor">12h</span>
                    </div>
                </div>
                <div class="vuelo-detalles">
                    <div class="vuelo-detalle-item">
                        <span class="detalle-label">Vuelo</span>
                        <span class="detalle-valor">EL 123</span>
                    </div>
                    <div class="vuelo-detalle-item">
                        <span class="detalle-label">Fecha</span>
                        <span class="detalle-valor">15 MAY 2026</span>
                    </div>
                    <div class="vuelo-detalle-item">
                        <span class="detalle-label">Escala</span>
                        <span class="detalle-valor">1 (Miami)</span>
                    </div>
                </div>
            
            </div>
        </div>

    </div>

</body>
</html>
