<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Vuelo | ELARIS</title>
    <link rel="stylesheet" href="../../css/cliente.css">
    <link rel="stylesheet" href="../../css/detalle-vuelo.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a class="navbar-logo" href="dashboard.html">
            <img src="../../imagenes/logo-dorado.png" alt="ELARIS" height="80">
        </a>
        <ul class="navbar-links">
            <li><a href="dashboard.html">Inicio</a></li>
            <li><a href="buscar-vuelos.html">Destinos</a></li>
            <li><a href="#">Información</a></li>
            <li><a href="#">Ayuda</a></li>
        </ul>
        <div class="navbar-perfil">
            <div class="perfil-trigger">
                <div class="avatar">M</div>
                <span>Messi</span>
            </div>
            <ul class="dropdown">
                <li><a href="#">Mi cuenta</a></li>
                <li><a href="mis-reservas.html">Mis reservas</a></li>
                <li><hr></li>
                <li><a href="../../paginas/inicio/login.html" class="cerrar-sesion">Cerrar sesión</a></li>
            </ul>
        </div>
    </nav>

    <!-- Parte principal -->
    <div class="detalle-contenedor">

        <!-- Columna izquierda imagen -->
        <div class="detalle-imagen">
            <img src="../../imagenes/nueva-york.jpg" alt="Cartagena">
        </div>

        <!-- Columna derecha info -->
        <div class="detalle-info">

            <h1 class="detalle-ciudad">Cartagena</h1>

            <div class="detalle-descuento">
                <span class="badge-descuento">Descuento 20%</span>
            </div>

            <p class="detalle-precio">$999.990 COP</p>
            <p class="detalle-tipo">Vuelo ida y vuelta</p>

            <div class="detalle-campos">
                <div class="campo-select">
                    <label>Origen</label>
                    <select>
                        <option>Bogotá</option>
                        <option>Medellín</option>
                        <option>Cali</option>
                    </select>
                </div>
                <div class="campo-select">
                    <label>Fecha</label>
                    <select>
                        <option>12-20 Mayo</option>
                        <option>21-30 Mayo</option>
                        <option>1-10 Junio</option>
                    </select>
                </div>
            </div>

            <a href="mis-reservas.html" class="btn-reservar-vuelo">Reservar vuelo</a>

        </div>

    </div>

</body>
</html>
