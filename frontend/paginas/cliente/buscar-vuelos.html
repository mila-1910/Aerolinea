<body>

    <!-- Navbar definido -->
<nav class="navbar">

    <a class="navbar-logo" href="dashboard.html">
        <img src="../../imagenes/logo-dorado.png" alt="ELARIS" height="80">
    </a>

    <ul class="navbar-links">
        <li><a href="dashboard.html">Inicio</a></li>
        <li><a href="buscar-vuelos.html">Destinos</a></li>
        <li><a href="#">Información</a></li>
        <li><a href="#">Ayuda</a></li>
    </ul>

    <div class="navbar-perfil">
        <div class="perfil-trigger">
            <div class="avatar">M</div>
            <span>Messi</span>
        </div>
        
        <ul class="dropdown">
            <li><a href="#">Mi cuenta</a></li>
            <li><a href="mis-reservas.html">Mis reservas</a></li>

        </ul>

    </div>

<!-- Este es el formulario de la busquedad de vuelos de usuario -->

<div class="buscador-header">

    <h2>¿Cual sera tu proximo destino?</h2>
    <p>Encuentra el vuelo perfecto para tu proximo viaje!! </p>

<!-- Tipo de viaja -->

<div class="tipo-viaje">
    <input type="radio" name="tipo" id="ida-vuelta" checked>
    <label for="ida-vuelta">Ida y vuelta</label>

    <input type="radio" name="tipo" id="solo-ida">
    <label for="solo-ida">Solo ida</label>
</div>
    

</div>

<!-- Campos -->

<div class="buscador-campos">

        <div class="campo-grupo">
            <label>Origen</label>
            <input type="text" placeholder="Ciudad de origen">
        </div>

        <div class="campo-grupo">
            <label>Destino</label>
            <input type="text" placeholder="Ciudad de destino">
        </div>

        <div class="campo-grupo">
            <label>Fecha de ida</label>
            <input type="date">
        </div>

        <div class="campo-grupo">
            <label>Fecha de regreso</label>
            <input type="date">
        </div>

        <div class="campo-grupo">
            <label>Pasajeros</label>
            <input type="number" min="1" max="10" value="1">
        </div>

        <button class="boton-buscar">Buscar vuelos</button>



</div>

</body>

</html>
