<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Paquetes</title>

    <link rel="stylesheet" href="../../css/admin.css">
</head>

<body>

    <!-- NAVBAR (usa el mismo del dashboard) -->
    <nav class="navbar">
        <div class="navbar-logo">
            <img src="../../imagenes/logo-dorado.png" alt="logo">
        </div>

        <ul class="navbar-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="vuelos.html">Vuelos</a></li>
            <li><a href="ubicaciones.html">Ubicaciones</a></li>
            <li><a href="paquetes.html">Paquetes</a></li>
        </ul>

        <div class="navbar-perfil">
            <div class="perfil-trigger">
                <div class="avatar">K</div>
                <span>Kamila</span>
            </div>
        </div>
    </nav>

    <div class="contenido">

        <!-- ENCABEZADO -->
        <div class="saludo">
            <h2>Gestión de Paquetes 🧳</h2>
            <p>Administra los paquetes turísticos disponibles</p>
        </div>

        <!-- FILTROS -->
        <div class="filtros">
            <input type="text" placeholder="Buscar paquete...">

            <select>
                <option>Todos</option>
                <option>Activos</option>
                <option>Agotados</option>
            </select>

            <a href="#" class="btn-card">+ Crear paquete</a>
        </div>

        <!-- CARDS DE PAQUETES (para que no se vea vacío 🔥) -->
        <div class="cards-container">

            <div class="card">
                <div class="card-icono">🏝️</div>
                <h3>Cartagena Premium</h3>
                <p>3 días / 2 noches</p>
                <a href="#" class="btn-card">Editar</a>
            </div>

            <div class="card">
                <div class="card-icono">🏔️</div>
                <h3>Medellín Aventura</h3>
                <p>Tour + hospedaje</p>
                <a href="#" class="btn-card">Editar</a>
            </div>

            <div class="card">
                <div class="card-icono">🌆</div>
                <h3>Bogotá Cultural</h3>
                <p>Museos y city tour</p>
                <a href="#" class="btn-card">Editar</a>
            </div>

        </div>

    </div>

</body>
</html>
