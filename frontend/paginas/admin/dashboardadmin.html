<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ELARIS</title>
    <link rel="icon" type="image/png" href="../../imagenes/logo-dorado.png">


    <link rel="stylesheet" href="../../css/admin.css">
    <!-- Font Awesome 6 — íconos profesionales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- ============================================
         NAVBAR SUPERIOR
         ============================================ -->
    <nav class="navbar">
        <a class="navbar-logo" href="dashboardadmin.html">
            <img src="../../imagenes/logo-dorado.png" alt="ELARIS" height="80">
        </a>

        <div class="navbar-right">
            <div class="navbar-perfil" id="perfilDropdown">
                <div class="perfil-trigger">
                    <div class="avatar">--</div>
                    <span>Cargando...</span>
                </div>
                <ul class="dropdown" id="perfilMenu">
                    <li><a href="#">Mi Perfil</a></li>
                    <li><a href="#" class="cerrar-sesion">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ============================================
         CONTENEDOR PRINCIPAL (SIDEBAR + CONTENIDO)
         ============================================ -->
    <div class="app-container">

        <!-- SIDEBAR IZQUIERDO -->
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="dashboardadmin.html" class="menu-item active">
                    <span class="menu-icono"><i class="fas fa-chart-line"></i></span>
                    <span class="menu-texto">Dashboard</span>
                </a>
                <a href="vuelos.html" class="menu-item">
                    <span class="menu-icono"><i class="fas fa-plane"></i></span>
                    <span class="menu-texto">Vuelos</span>
                </a>
                <a href="paquetes.html" class="menu-item">
                    <span class="menu-icono"><i class="fas fa-box"></i></span>
                    <span class="menu-texto">Paquetes</span>
                </a>
                <a href="ubicaciones.html" class="menu-item">
                    <span class="menu-icono"><i class="fas fa-map-marker-alt"></i></span>
                    <span class="menu-texto">Ubicaciones</span>
                </a>
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="contenido-principal">

            <!-- TÍTULO -->
            <div class="saludo">
                <h2><i class="fas fa-chart-line"></i> Dashboard</h2>
                <p>Resumen general del sistema</p>
            </div>

            <div class="dashboard-grid">
                <!-- Vuelos KPI -->
                <div class="glass-card kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrapper">
                            <i class="fas fa-plane"></i>
                        </div>
                        <span class="kpi-trend positive"><i class="fas fa-arrow-up"></i> +12%</span>
                    </div>
                    <div class="kpi-content">
                        <span class="kpi-value" id="totalVuelos">0</span>
                        <span class="kpi-label">Vuelos Registrados</span>
                    </div>
                </div>

                <!-- Paquetes KPI -->
                <div class="glass-card kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrapper">
                            <i class="fas fa-box"></i>
                        </div>
                        <span class="kpi-trend positive"><i class="fas fa-arrow-up"></i> +5%</span>
                    </div>
                    <div class="kpi-content">
                        <span class="kpi-value" id="totalPaquetes">0</span>
                        <span class="kpi-label">Paquetes Activos</span>
                    </div>
                </div>

                <!-- Ubicaciones KPI -->
                <div class="glass-card kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                    </div>
                    <div class="kpi-content">
                        <span class="kpi-value" id="totalDestinos">0</span>
                        <span class="kpi-label">Destinos</span>
                    </div>
                </div>

                <!-- Reservas Totales KPI -->
                <div class="glass-card kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrapper">
                            <i class="fas fa-ticket-alt"></i>
                        </div>
                    </div>
                    <div class="kpi-content">
                        <span class="kpi-value" id="totalReservas">0</span>
                        <span class="kpi-label">Reservas Totales</span>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN DE ANÁLISIS -->
            <div class="analysis-grid">
                


                <!-- ÚLTIMAS RESERVAS -->
                <div class="glass-card">
                    <div class="card-header-premium">
                        <h3><i class="fas fa-history"></i> Últimas Reservas</h3>
                    </div>
                    <div class="tabla-contenedor">
                        <table class="tabla-premium">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Pasajero</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            
                        </table>
                    </div>
                </div>

                <!-- ESTADÍSTICAS VISUALES -->
                <div class="glass-card">
                    <div class="card-header-premium">
                        <h3><i class="fas fa-chart-pie"></i> Rendimiento del Sistema</h3>
                    </div>
                    <div class="charts-grid">
                        <div class="chart-wrapper">
                            <canvas id="graficoBarras"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="graficoTorta"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </main>

    </div>

    <!-- SCRIPTS PARA LOS GRÁFICOS Y NAVBAR -->
    <!-- SCRIPTS -->
    <script src="../../js/admin-comun.js"></script>

    <!-- GRÁFICOS CON CHART.JS -->
    <script>
        // Configuración de gráficos
        const ctxBarras = document.getElementById('graficoBarras').getContext('2d');
        const ctxTorta = document.getElementById('graficoTorta').getContext('2d');

        // GRÁFICO DE BARRAS
        new Chart(ctxBarras, {
            type: 'bar',
            data: {
                labels: ['Vuelos', 'Paquetes', 'Ubicaciones', 'Reservas'],
                datasets: [{
                    label: 'Cantidad',
                    data: [120, 45, 30, 80],
                    backgroundColor: [
                        '#d4af37',
                        '#a8326e',
                        '#7B1C4E',
                        '#c8648c'
                    ],
                    borderColor: '#7B1C4E',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 150
                    }
                }
            }
        });

        // GRÁFICO DE PASTEL
        new Chart(ctxTorta, {
            type: 'doughnut',
            data: {
                labels: ['Vuelos', 'Paquetes', 'Ubicaciones', 'Reservas'],
                datasets: [{
                    data: [120, 45, 30, 80],
                    backgroundColor: [
                        '#d4af37',
                        '#a8326e',
                        '#7B1C4E',
                        '#c8648c'
                    ],
                    borderColor: '#ffffff',
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#333',
                            font: { size: 10 },
                            padding: 10
                        }
                    }
                }
            }
        });
    </script>

</body>

</html>
